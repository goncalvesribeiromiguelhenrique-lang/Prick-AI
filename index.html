<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prick IA</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#202123;
    color:white;
    display:flex;
    height:100vh;
}

/* SIDEBAR */

#sidebar{
    width:250px;
    background:#171717;
    padding:10px;
    overflow-y:auto;
}

#novoChat{
    width:100%;
    padding:12px;
    border:none;
    background:#343541;
    color:white;
    cursor:pointer;
    border-radius:8px;
    margin-bottom:10px;
    font-size:16px;
}

.chatItem{
    background:#2b2c31;
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
}

/* MAIN */

#main{
    flex:1;
    display:flex;
    flex-direction:column;
}

#mensagens{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

/* MENSAGENS */

.mensagem{
    margin-bottom:15px;
    padding:12px;
    border-radius:10px;
    max-width:70%;
    word-wrap:break-word;
}

.user{
    background:#0b93f6;
    margin-left:auto;
}

.ai{
    background:#444654;
}

/* INPUT */

#inputArea{
    display:flex;
    padding:15px;
    background:#2b2c31;
}

#inputMensagem{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#40414f;
    color:white;
    font-size:16px;
}

#enviar{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#19c37d;
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* BOTÃO EXCLUIR */

.excluirBtn{
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    padding:5px 8px;
}

.chatNome{
    cursor:pointer;
}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div id="sidebar">

    <button id="novoChat">
        + Novo Chat
    </button>

    <div id="listaChats"></div>

</div>

<!-- MAIN -->

<div id="main">

    <div id="mensagens"></div>

    <div id="inputArea">

        <input
            type="text"
            id="inputMensagem"
            placeholder="Digite uma mensagem..."
        >

        <button id="enviar">
            Enviar
        </button>

    </div>

</div>

<script>


/* =========================
   SISTEMA
========================= */

let chats = [];

let chatAtual = null;

/* CARREGAR */

let dadosSalvos =
localStorage.getItem("chats");

if(dadosSalvos){

    chats = JSON.parse(dadosSalvos);

    atualizarSidebar();

}

/* NOVO CHAT */

document
.getElementById("novoChat")
.onclick = criarNovoChat;

function criarNovoChat(){

    let numero = chats.length + 1;

    let novoChat = {

        id: Date.now(),

        nome: "NewChat" + numero,

        mensagens: []

    };

    chats.push(novoChat);

    salvarChats();

    atualizarSidebar();

    abrirChat(novoChat.id);

}

/* SIDEBAR */

function atualizarSidebar(){

    let lista =
    document.getElementById("listaChats");

    lista.innerHTML = "";

    chats.forEach(chat => {

        let div =
        document.createElement("div");

        div.className = "chatItem";

        let container =
        document.createElement("div");

        container.style.display = "flex";

        container.style.justifyContent =
        "space-between";

        container.style.alignItems =
        "center";

        /* NOME */

        let nome =
        document.createElement("span");

        nome.className = "chatNome";

        nome.innerText = chat.nome;

        nome.onclick =
        () => abrirChat(chat.id);

        /* EXCLUIR */

        let excluir =
        document.createElement("button");

        excluir.className = "excluirBtn";

        excluir.innerText = "X";

        excluir.onclick = () => {

            excluirChat(chat.id);

        };

        container.appendChild(nome);

        container.appendChild(excluir);

        div.appendChild(container);

        lista.appendChild(div);

    });

}

/* ABRIR CHAT */

function abrirChat(id){

    chatAtual =
    chats.find(chat => chat.id === id);

    renderizarMensagens();

}

/* RENDERIZAR */

function renderizarMensagens(){

    let area =
    document.getElementById("mensagens");

    area.innerHTML = "";

    if(!chatAtual) return;

    chatAtual.mensagens.forEach(msg => {

        let div =
        document.createElement("div");

        div.classList.add("mensagem");

        div.classList.add(msg.autor);

        div.innerText = msg.texto;

        area.appendChild(div);

    });

    area.scrollTop =
    area.scrollHeight;

}

/* ENVIAR */

document
.getElementById("enviar")
.onclick = enviarMensagem;

async function enviarMensagem(){

    let input =
    document.getElementById("inputMensagem");

    let texto = input.value;

    if(texto === "") return;

    if(!chatAtual){

        criarNovoChat();

    }

    /* USER */

    chatAtual.mensagens.push({

        autor:"user",

        texto:texto

    });

    renderizarMensagens();

    input.value = "";

    /* IA PENSANDO */

    let carregando = {

        autor:"ai",

        texto:"Pensando..."

    };

    chatAtual.mensagens.push(carregando);

    renderizarMensagens();

    /* IA */

    let respostaIA =
    await chamarIA(texto);

    carregando.texto =
    respostaIA;

    salvarChats();

    renderizarMensagens();

}

/* OPENROUTER */

async function chamarIA(mensagem){

    try{

        let resposta = await fetch(
            "https://prick-ia-backend.onrender.com/chat",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    mensagem: mensagem
                })
            }
        );

        let dados = await resposta.json();

        return dados.resposta;

    } catch (erro) {

        console.log(erro);

        return "Erro ao conectar.";

    }

}

/* EXCLUIR CHAT */

function excluirChat(id){

    chats =
    chats.filter(
        chat => chat.id !== id
    );

    if(chatAtual &&
       chatAtual.id === id){

        chatAtual = null;

        document
        .getElementById("mensagens")
        .innerHTML = "";

    }

    salvarChats();

    atualizarSidebar();

}

/* SALVAR */

function salvarChats(){

    localStorage.setItem(

        "chats",

        JSON.stringify(chats)

    );

}

</script>

</body>
</html>
